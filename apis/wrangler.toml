name = "theta-api"
main = "src/index.ts"
compatibility_date = "2025-05-15"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "theta"
database_id = "bb7e9eef-e44f-4811-b3a1-85bb39de1fbf"
preview_database_id = "theta-local"

# Local vars live in .dev.vars; production uses `wrangler secret put`.
# Secrets (set via `wrangler secret put`): GOOGLE_CLIENT_SECRET, SERVICE_TOKEN
[vars]
APP_URL = "https://auth.theeta.in"
FRONTEND_URL = "https://theeta.in"
FASTAPI_WORKER_URL = "https://api.theeta.in"
GOOGLE_CLIENT_ID = "692553043515-2v7s88v0u3i5h0ib2oi9mj18796lkdsb.apps.googleusercontent.com"

[[routes]]
pattern = "auth.theeta.in"
custom_domain = true

# Run `wrangler d1 create theta` and paste the real database_id above before deploying.
# Uncomment when the bindings exist:
# [[r2_buckets]]
# binding = "MEDIA"
# bucket_name = "theta-media"
# [[kv_namespaces]]
# binding = "CACHE"
# id = "..."
# [[queues.producers]]
# binding = "REEL_QUEUE"
# queue = "theta-reels"
