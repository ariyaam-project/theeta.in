# Production container for the FastAPI reel worker.
#
# The Hono API is a Cloudflare Worker, so deploy it with Wrangler:
#   cd apis && npm run db:migrate:remote && npm run deploy
#
# Run this file only on the host that should process reel jobs:
#   docker compose -f docker-compose.prod.yml up -d --build

name: theta-prod

services:
  transcription-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8888:8000"
    env_file:
      - ./worker/.env
    volumes:
      - whisper_cache:/root/.cache/huggingface
      - ./worker/instagram-cookies.txt:/app/instagram-cookies.txt:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  whisper_cache:
