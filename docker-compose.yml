# Theta local stack: Hono API (Cloudflare Worker via wrangler dev + local D1)
# plus the FastAPI reel download/transcription worker.
#
#   docker compose up --build        # start
#   docker compose run --rm api npm run db:seed:local   # load demo data
#
# API: http://localhost:8787

services:
  api:
    build:
      context: ./apis
      dockerfile: Dockerfile
    image: theta-api
    ports:
      - "8787:8787"
    environment:
      CI: "true"
      WRANGLER_SEND_METRICS: "false"
      SERVICE_TOKEN: "${SERVICE_TOKEN:-local-development-token}"
    # Optional: provide Google OAuth + service token for auth flows.
    # Copy apis/.dev.vars.example -> apis/.dev.vars, then uncomment:
    # env_file:
    #   - ./apis/.dev.vars
    volumes:
      - ./apis:/app          # live code
      - api_node_modules:/app/node_modules   # keep image's installed deps
      - d1_state:/app/.wrangler              # persist local D1 + seed
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:8787/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  transcription-worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    image: theta-transcription-worker
    ports:
      - "8000:8000"
    environment:
      API_BASE_URL: "http://api:8787"
      SERVICE_TOKEN: "${SERVICE_TOKEN:-local-development-token}"
      WHISPER_MODEL: "${WHISPER_MODEL:-small}"
      WHISPER_DEVICE: "${WHISPER_DEVICE:-cpu}"
      WHISPER_COMPUTE_TYPE: "${WHISPER_COMPUTE_TYPE:-int8}"
      MAX_DURATION_SECONDS: "${MAX_DURATION_SECONDS:-180}"
      MAX_DOWNLOAD_MB: "${MAX_DOWNLOAD_MB:-100}"
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - whisper_cache:/root/.cache/huggingface
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  api_node_modules:
  d1_state:
  whisper_cache:
